version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: movie-catalog-db
    environment:
      POSTGRES_DB: moviecatalog
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: